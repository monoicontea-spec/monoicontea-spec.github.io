aculty Page** | [Gachon University Faculty Profile](https://www.gachon.ac.kr/ind/5300/subview.do) |\r\n\r\n---\r\n\r\n## Education / 학력\r\n\r\n| Degree | Institution | Field |\r\n|--------|-------------|-------|\r\n| Ph.D. | Hongik University (홍익대학교) | UI/UX Design (UI/UX 디자인학) |\r\n| M.A. | Gachon University (가천대학교) | — |\r\n| B.A. | Gachon University (가천대학교) | — |\r\n\r\n---\r\n\r\n## Publications / 저서\r\n\r\n| Year | Title | Publisher |\r\n|------|-------|-----------|\r\n| 2017 | **Analog** — 디자인 전공자를 위한 디자인 해부학 사례기반 교재 | Gachon Univ., Dept. of Industrial Design |\r\n| 2017 | **Lifestyle** — 디자인 전공자를 위한 디자인 해부학 사례기반 교재 | Gachon Univ., Dept. of Industrial Design |\r\n| 2017 | **Etc** — 디자인 전공자를 위한 디자인 해부학 사례기반 교재 | Gachon Univ., Dept. of Industrial Design |\r\n| 2017 | **Optics \u0026 DTP** — 디자인 전공자를 위한 디자인 해부학 사례기반 교재 | Gachon Univ., Dept. of Industrial Design |\r\n\r\n\u003e Case-based design anatomy textbooks for design majors  \r\n\u003e 디자인 전공자를 위한 사례기반 디자인 해부학 교재 시리즈\r\n\r\n---\r\n\r\n## Patents / 특허\r\n\r\n| Year | Title | Inventors |\r\n|------|-------|-----------|\r\n| 2019 | 책등인식수단이 구비된 링제본 방식 책자\u003cbr\u003e*Book of bookbinding using a ring with a disclosed backbone* | 문혜인, **육호준**, 조정윤, 최지우 |\r\n\r\n---\r\n\r\n## Selected Exhibitions / 주요 전시 (Recent)\r\n\r\n| Year | Exhibition | Work |\r\n|------|------------|------|\r\n| 2026 | 2026 한국기초조형학회 아르메니아 국제초대작품전 | The Ultimate Interface #08 iPod Gen4 U2 Special Edition |\r\n| 2026 | 제90회 2026 한국기초조형학회 두바이 국제초대작품전 | The Ultimate Interface #09 / MONAMI 153 |\r\n| 2026 | KOCON2026 International Digital Design Invitation Exhibition | BrailleLink |\r\n| 2026 | 2026 국제디자인트렌드 초대작품전 | Infotopia |\r\n| 2025 | 2025 KSBDA QINGDAO INTERNATIONAL INVITATION EXHIBITION | uluru |\r\n| 2025 | KOCON 2025 International Digital Design Invitation Exhibition | The World\u0027s Famous Mountain |\r\n| 2025 | 2025 국제디자인트렌드 초대작품전 | matterhorn |\r\n| 2025 | 2025 (사)한국조형디자인협회 국제조형디자인전 | Infolayering |\r\n| 2022 | KoCon The 38th KOCON2022 International Digital Design Invitation Exhibition | LPD#02 |\r\n| 2021 | KOCON 2021 International Digital Design Invitation Exhibition | 911 |\r\n\r\n📂 **[View all exhibitions (2014–2026) →](EXHIBITIONS.md)**  \r\n*전체 공연·전시 실적 보기 (약 70건)*\r\n\r\n\u003cdetails\u003e\r\n\u003csummary\u003e\u003cb\u003e2025 Exhibitions (collapsed) / 2025년 전시 (접기)\u003c/b\u003e\u003c/summary\u003e\r\n\r\n| Exhibition | Work |\r\n|------------|------|\r\n| 2025 한국기초조형학회 춘계 국제초대작품전 | AIGUILLE DU DRU |\r\n| 2025 한국디자인학회 봄 국제초대전 | DeF1 |\r\n| 제86회 2025 한국기초조형학회 지로나 국제초대작품전 | Alpamayo |\r\n| 2025 아시아 기초조형연합학회 초대작품전 | Sil |\r\n| 2025 Shenyang International Digital Design Invitation Exhibition | EVEREST |\r\n| 탕산 국제초대전 | The Ultimate Interface #01 - Dial |\r\n| 2025 International Digital Design Special Invitational Exhibition | THE ULTIMATE INTERFACE #02 |\r\n| GIAF초청 2025 KSBDA 세종특별전 | TurntableTonearm |\r\n| 2025 국제디자인초대작품전 | The Ultimate Interface #05 |\r\n| ICCC 2025 International Digital Design Exhibition | The Ultimate Interface #03 |\r\n| 2025 한국디자인학회 가을 국제초대전 | The Ultimate Interface #04 |\r\n| 제88회 2025 한국기초조형학회 추계 국제초대작품전 | The Ultimate Interface #06 |\r\n\r\n\u003c/details\u003e\r\n\r\n---\r\n\r\n\u003cdiv align=\"center\"\u003e\r\n\r\n*Last updated: July 2026*\r\n\r\n\u003c/div\u003e\r\n","PSPath":"C:\\Users\\GC\\Desktop\\github-profile\\README.md","PSParentPath":"C:\\Users\\GC\\Desktop\\github-profile","PSChildName":"README.md","PSDrive":{"CurrentLocation":"Users\\GC\\Desktop\\github-profile","Name":"C","Provider":{"ImplementingType":"Microsoft.PowerShell.Commands.FileSystemProvider","HelpFile":"System.Management.Automation.dll-Help.xml","Name":"FileSystem","PSSnapIn":"Microsoft.PowerShell.Core","ModuleName":"Microsoft.PowerShell.Core","Module":null,"Description":"","Capabilities":52,"Home":"C:\\Users\\GC","Drives":"C D E"},"Root":"C:\\","Description":"","MaximumSize":null,"Credential":{"UserName":null,"Password":null},"DisplayRoot":null},"PSProvider":{"ImplementingType":{"M     const repoNameEl = document.getElementById("repo-name");
    function render(key) {
      const file = files[key];
      repoNameEl.textContent = file.name;
      let md = file.md.replace(/monoicontea/g, "monoicontea-spec");
      contentEl.innerHTML = marked.parse(md);

        render(btn.dataset.key);
      });
    });
