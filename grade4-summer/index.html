<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4학년 제품 썸머 — 주간 일정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <h1 class="title" id="page-title">4학년 제품 썸머</h1>
        <p class="subtitle">주간 상담 일정</p>
      </div>
      <nav class="week-nav" aria-label="주간 이동">
        <button type="button" class="nav-btn" id="btn-prev" aria-label="이전 주">&larr; 이전 주</button>
        <div class="week-range" id="week-range" aria-live="polite"></div>
        <button type="button" class="nav-btn" id="btn-next" aria-label="다음 주">다음 주 &rarr;</button>
        <button type="button" class="nav-btn nav-btn-today" id="btn-today">오늘</button>
        <button type="button" class="nav-btn nav-btn-refresh" id="btn-refresh" aria-label="시트 새로고침">↻ 새로고침</button>
      </nav>
      <p class="sync-status" id="sync-status" aria-live="polite"></p>
    </header>

    <main class="main">
      <div class="grid-wrap">
        <div class="schedule-grid" id="schedule-grid" role="grid" aria-label="주간 상담 일정표">
          <!-- rendered by app.js -->
        </div>
      </div>
    </main>

    <footer class="footer">
      <span class="legend-item"><span class="badge badge-online">온라인</span></span>
      <span class="legend-item"><span class="badge badge-offline">오프라인</span></span>
      <span class="legend-note">Google Sheets에서 실시간 반영 · <a href="../index.html">프로필로 돌아가기</a></span>
    </footer>
  </div>

  <script src="js/schedule-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
